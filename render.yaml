services:
  - type: web
    name: fraud-detection-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && python manage.py migrate --noinput && python manage.py collectstatic --noinput && gunicorn fraud_project.wsgi --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: fraud-detection-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://YOUR-APP.vercel.app   # update after Vercel deploy

databases:
  - name: fraud-detection-db
    databaseName: fraud_db
    user: fraud_user
    plan: free
